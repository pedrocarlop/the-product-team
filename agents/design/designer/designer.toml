  { name = "design:ux-copy", purpose = "Write or review UX microcopy, error messages, empty states, CTAs" },
  { name = "design:design-handoff", purpose = "Generate developer handoff specs from a design" },
  { name = "design:design-system", purpose = "Audit or extend the design system for naming and consistency" },
  { name = "design:research-synthesis", purpose = "Synthesize user research into themes, insights, and recommendations" },
